   <meta charset="utf-8">

   <title>Meal Deal Generator</title>
   <link rel="stylesheet" type="text/css" href="style.css">

   <!-- FONTS -->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

   <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

   <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">

   <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>
   <section class="receipt-view">
      <div class="receipt-wrapper">
         <div class="receipt">
            <div class="receipt-folds"></div>
            <!-- <div class="receipt-shine"></div> -->
            <!-- <div class="receipt-shadow"></div> -->
            <header>
               TESCO
            </header>
            <div class="receipt-line">
               ---------------------------------------------------
            </div>
            <div class="receipt-row main">
               <span class="item-name">Words Go Here</span>
               <span class="row-spacer"></span>
               <span class="item-price">£2.00</span>
            </div>
            <div class="receipt-row snack">
               <span class="item-name">Words Go</span>
               <span class="row-spacer"></span>
               <span class="item-price">£2.00</span>
            </div>
            <div class="receipt-row drink">
               <span class="item-name">Words Go Here</span>
               <span class="row-spacer"></span>
               <span class="item-price">£2.00</span>
            </div>
            <div class="receipt-line">
               ---------------------------------------------------
            </div>
            <div class="receipt-row bold">
               <span>Subtotal:</span>
               <span class="row-spacer"></span>
               <span class="subtotal">£3.85</span>
            </div>
            <div class="receipt-row bold">
               <span>Savings:</span>
               <span class="row-spacer"></span>
               <span class="saved-price">£2.00</span>
            </div>
            <div class="receipt-line">
               ---------------------------------------------------
            </div>
            <div class="receipt-row bold">
               <span>TOTAL:</span>
               <span class="row-spacer"></span>
               <span>£3.85</span>
            </div>
         </div>
      </div>
   </section>
